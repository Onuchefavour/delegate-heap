[project]
name = "delegate-heap"
authors = ["Delegate Heap Core Team"]
description = "A decentralized resource allocation and delegation platform"
telemetry = false
requirements = []
[contracts.resource-allocator]
path = "contracts/resource-allocator.clar"
depends_on = []

[contracts.resource-processor]
path = "contracts/resource-processor.clar"
depends_on = []

[contracts.access-control]
path = "contracts/access-control.clar"
depends_on = []

[contracts.delegation-tracker]
path = "contracts/delegation-tracker.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
